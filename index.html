<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f8f8f8;
  --surface: #ffffff;
  --text: #111;
  --sub: #666;
  --border: #e5e5e5;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', 'Noto Sans JP', sans-serif;
  font-size: 15px;
  line-height: 1.7;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 20px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: 100%;
  max-width: 440px;
  padding: 40px 36px;
}

.name {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -.01em;
  margin-bottom: 2px;
}

.name-en {
  font-size: 13px;
  color: var(--sub);
  letter-spacing: .02em;
  margin-bottom: 20px;
}

.bio {
  font-size: 14px;
  color: var(--sub);
  line-height: 1.9;
  margin-bottom: 28px;
  padding-bottom: 28px;
  border-bottom: 1px solid var(--border);
}

.links {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.link-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  text-decoration: none;
  color: var(--text);
  font-size: 14px;
  font-weight: 500;
  transition: border-color .12s, background .12s;
}

.link-item:hover {
  border-color: #aaa;
  background: var(--bg);
}

.link-icon {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  background: #f0f0f0;
}

.link-label { flex: 1; }
.link-sub { font-size: 12px; color: var(--sub); font-weight: 400; }
.arrow { color: #bbb; font-size: 13px; }

footer {
  margin-top: 24px;
  font-size: 12px;
  color: #bbb;
}
</style>
</head>
